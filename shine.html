<script type="module">

const THEME = {

  blue:'#1565C0', blueDk:'#0D47A1', purple:'#6A1B9A', purpleDk:'#4A0D7A',
  yellow:'#FFD700', yellowDk:'#7A6200', grey:'#C2C2C2', red:'#DC2626',

  events:`${CAMP_ID}-v2-events`,         // camp-specific
  adminPin:`${CAMP_ID}-v2-adminPin`,     // camp-specific

// ── SECTIONS campers can be checked into ───────────────────────────────────
const SECTIONS = {

  arrived:    { label:'Camp Check-In',     icon:'✅', color:THEME.green,    dk:THEME.greenDk  },
  restroom:   { label:'Potty Break',       icon:'🚻', color:THEME.yellow,   dk:THEME.yellowDk },
  aftercare:  { label:'After Care',        icon:'🌙', color:THEME.purple,   dk:THEME.purpleDk },

  activity:   { label:'Special Activity',  icon:'🎯', color:THEME.blue,     dk:THEME.blueDk   },
  lunch:      { label:'Lunch',             icon:'🍽',  color:THEME.green,    dk:THEME.greenDk  },

// Status after an action

  'return':'arrived', aftercare:'aftercare', medical:'medical',
  activity:'activity', lunch:'lunch', checkout:'out', pickup:'out', reenter:'arrived',

// Available next actions per current status
const NEXT_ACTIONS = {
  pending:    ['beforecare','arrived'],
  beforecare: ['arrived','pickup'],
  arrived:    ['restroom','aftercare','medical','activity','lunch','checkout','pickup'],
  restroom:   ['return','checkout','pickup'],
  aftercare:  ['checkout','pickup'],
  medical:    ['return','checkout','pickup'],
  activity:   ['return','checkout','pickup'],
  lunch:      ['return','checkout','pickup'],
  out:        ['reenter'],
};

// Action definitions (what label/icon to show on buttons)
const ACTIONS = {
  beforecare: { label:'Before Care Arrival',  icon:'🌅', color:THEME.purple,   dk:THEME.purpleDk, next:'beforecare' },
  arrived:    { label:'Camp Check-In',        icon:'✅', color:THEME.green,    dk:THEME.greenDk,  next:'arrived'    },
  restroom:   { label:'Potty Break',          icon:'🚻', color:THEME.yellow,   dk:THEME.yellowDk, next:'restroom'   },
  return:     { label:'Return from Break',    icon:'↩',  color:THEME.green,    dk:THEME.greenDk,  next:'arrived'    },
  aftercare:  { label:'After Care Check-In',  icon:'🌙', color:THEME.purple,   dk:THEME.purpleDk, next:'aftercare'  },
  medical:    { label:'Medical / Nurse',      icon:'🩺', color:THEME.red,      dk:THEME.red,      next:'medical'    },
  activity:   { label:'Special Activity',     icon:'🎯', color:THEME.blue,     dk:THEME.blueDk,   next:'activity'   },
  lunch:      { label:'Lunch',                icon:'🍽',  color:THEME.green,    dk:THEME.greenDk,  next:'lunch'      },
  checkout:   { label:'Check Out (Staff)',     icon:'🚪', color:THEME.red,      dk:THEME.red,      next:'out'        },
  pickup:     { label:'Parent Pickup',        icon:'🚗', color:THEME.sub,      dk:THEME.sub,      next:'out'        },
  reenter:    { label:'Re-enter Camp',        icon:'↩',  color:THEME.green,    dk:THEME.greenDk,  next:'arrived'    },
};

const STATUS_LABELS = {
  pending:    { label:'Not Arrived',  color:THEME.muted,    dot:'○' },
  beforecare: { label:'Before Care',  color:THEME.purpleDk, dot:'◑' },
  arrived:    { label:'Present',      color:THEME.greenDk,  dot:'●' },
  restroom:   { label:'Potty Break',  color:THEME.yellowDk, dot:'◉' },
  aftercare:  { label:'After Care',   color:THEME.purpleDk, dot:'◑' },
  medical:    { label:'Medical',      color:THEME.red,      dot:'◉' },
  activity:   { label:'Activity',     color:THEME.blueDk,   dot:'◑' },
  lunch:      { label:'Lunch',        color:THEME.greenDk,  dot:'◑' },
  out:        { label:'Checked Out',  color:THEME.muted,    dot:'○' },
};

// ── STORAGE ──────────────────────────────────────────────────────────────────
// Firebase Realtime Database for cross-device sync.
// Falls back to localStorage if Firebase is unreachable.
function fbKey(key) { return key.replace(/[.#$[\]/]/g, '_'); }

let SYNC_OK = null; Object.defineProperty(window,"SYNC_OK",{get:()=>SYNC_OK,set:v=>{SYNC_OK=v;}}); // null=unknown, true=connected, false=error

async function kvGet(key) {
  const fb = window.FIREBASE_URL;
  if (fb) {
    try {
      const r = await fetch(`${fb}/camp/${fbKey(key)}.json`);
      if (r.ok) { SYNC_OK = true; return r.json(); }
      SYNC_OK = false;
    } catch { SYNC_OK = false; }
  }
  // localStorage fallback
  const v = localStorage.getItem('acfc-' + key);
  return v ? JSON.parse(v) : null;
}

async function kvPut(key, value) {
  const fb = window.FIREBASE_URL;
  if (fb) {
    try {
      const r = await fetch(`${fb}/camp/${fbKey(key)}.json`, {
        method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(value),
      });
      if (r.ok) { SYNC_OK = true; localStorage.setItem('acfc-' + key, JSON.stringify(value)); return; }
      SYNC_OK = false;
    } catch { SYNC_OK = false; }
  }
  // localStorage fallback (always save locally as backup)
  localStorage.setItem('acfc-' + key, JSON.stringify(value));
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const uid = () => `${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
const fmtDateTime = ts => new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric'})
  + ' · ' + new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
const fmtTime = ts => new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
const minutesSince = ts => Math.floor((Date.now() - new Date(ts)) / 60000);
const nowHHMM = () => { const d=new Date(); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };
const camperStatus = (camperId, events) => {
  const ev = [...events].filter(e=>e.camperId===camperId).sort((a,b)=>new Date(b.ts)-new Date(a.ts))[0];
  if (!ev) return 'pending';
  return ACTION_TO_STATUS[ev.action] ?? 'pending';
};
const qrUrl = (data, color='14172A') =>
  `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(data)}&color=${color}&bgcolor=ffffff&margin=10`;
const camperQR  = id => qrUrl('CAMP:'+id);
const parentQR  = id => qrUrl('PARENT:'+id, '4E38B8');
const staffQR   = id => qrUrl('STAFF:'+id);
const volQR     = id => qrUrl('VOL:'+id);

// ── REACTIVE STATE ────────────────────────────────────────────────────────────
let STATE = {
  view: 'home',         // home | scan | log | admin | vol
  adminTab: 'campers',
  loading: true,
  adminUnlocked: false,
  volUnlocked: false,
  campers: [],
  staff: [],
  volunteers: [],
  events: [],
  staffEvents: [],
  adminPin: '3570',
  // volunteers have their own username/password list
  // modal state
  modal: null,  // null | {type, ...data}
  confirmPin: null, // 'admin' | 'vol' | 'changePin' | 'newVol'
  pinInput: '',
  pinError: '',
  pinStep: 'enter', // 'enter' | 'new' | 'confirm'
  pinNewTemp: '',
  search: '',
  toast: null,
  // vol login
  volLoginUser: '',
  volLoginPass: '',
  volLoginError: '',
  volUser: null,  // logged-in volunteer object
};

// Refs for camera
let videoEl=null, canvasEl=null, scanRAF=null, scanStream=null, scanLocked=false;

// ── RENDER ENGINE ─────────────────────────────────────────────────────────────
function render() {
  const root = document.getElementById('root');
  root.innerHTML = '';
  root.appendChild(buildApp());
}

// ── DATA LOAD ─────────────────────────────────────────────────────────────────
async function loadData() {
  const [campers, staff, volunteers, events, staffEvents, adminPin] = await Promise.all([
    kvGet(KEYS.campers), kvGet(KEYS.staff), kvGet(KEYS.volunteers),
    kvGet(KEYS.events), kvGet(KEYS.staffEvents), kvGet(KEYS.adminPin),
  ]);
  STATE.campers     = campers     || [];
  STATE.staff       = staff       || [];
  STATE.volunteers  = volunteers  || [];
  STATE.events      = events      || [];
  STATE.staffEvents = staffEvents || [];
  STATE.adminPin    = adminPin    || '3570';
  STATE.loading     = false;
  render();
}

async function saveAndRender(key, val) {
  await kvPut(key, val);
  render();
}

// Poll every 30s for multi-device sync
// Skips re-render while user is in admin/vol views, typing, or scanning
setInterval(async () => {
  if (!window.FIREBASE_URL) return;
  const inForms   = STATE.view === 'admin' || STATE.view === 'vol';
  const hasModal  = !!STATE.modal;
  const active    = document.activeElement;
  const userTyping = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.tagName === 'SELECT');
  // Fetch fresh data in background regardless
  const [campers, staff, volunteers, events, staffEvents] = await Promise.all([
    kvGet(KEYS.campers), kvGet(KEYS.staff), kvGet(KEYS.volunteers),
    kvGet(KEYS.events), kvGet(KEYS.staffEvents),
  ]);
  STATE.campers     = campers     || STATE.campers;
  STATE.staff       = staff       || STATE.staff;
  STATE.volunteers  = volunteers  || STATE.volunteers;
  STATE.events      = events      || STATE.events;
  STATE.staffEvents = staffEvents || STATE.staffEvents;
  // Only re-render on home/log/scan views when nothing sensitive is happening
  if (!inForms && !hasModal && !userTyping && !scanStream) render();
}, 30000);

// ── LOG AN EVENT ──────────────────────────────────────────────────────────────
async function logEvent(camperId, action, note='') {
  const camper = STATE.campers.find(c=>c.id===camperId);
  if (!camper) return null;
  const ev = { id:uid(), camperId, camperName:camper.name, action, note, ts:new Date().toISOString() };
  const updated = [ev, ...STATE.events].slice(0, 5000);
  STATE.events = updated;
  await kvPut(KEYS.events, updated);
  return ev;
}

// ── BUILD UI ──────────────────────────────────────────────────────────────────

// Generic button
function btn(label, onClick, opts={}) {
  const b = document.createElement('button');
  b.innerHTML = label;
  Object.assign(b.style, {
    padding: opts.small ? '8px 14px' : '12px 22px',
    fontSize: opts.small ? '13px' : '14px',
    fontWeight: '700',
    borderRadius: '10px',
    cursor: 'pointer',
    fontFamily: 'inherit',
    width: opts.full ? '100%' : undefined,
    background: opts.ghost ? 'transparent' : (opts.color || THEME.green),
    border: `1.5px solid ${opts.ghost ? THEME.border : (opts.color || THEME.green)}`,
    color: opts.ghost ? THEME.muted : (opts.color===THEME.yellow||opts.color===THEME.green ? THEME.text : '#fff'),
    marginTop: opts.mt || '0',
    ...opts.style,
  });
  if (opts.ghost) b.style.color = opts.textColor || THEME.muted;
  b.onclick = onClick;
  return b;
}

// Input field
function inp(placeholder, value, onChange, opts={}) {
  const el = document.createElement(opts.area ? 'textarea' : 'input');
  el.placeholder = placeholder;
  el.value = value || '';
  Object.assign(el.style, {
    padding:'11px 14px', borderRadius:'10px',
    border:`1.5px solid ${THEME.border}`, background:THEME.card,
    color:THEME.text, fontSize:'15px', outline:'none',
    width:'100%', boxSizing:'border-box',
    ...(opts.area ? {resize:'vertical', height:'80px'} : {}),
    ...opts.style,
  });
  el.oninput = e => onChange(e.target.value);
  if (opts.onEnter) el.onkeydown = e => { if(e.key==='Enter') opts.onEnter(); };
  return el;
}

// Card container
function card(children, style={}) {
  const d = document.createElement('div');
  Object.assign(d.style, {
    background:THEME.card, border:`1px solid ${THEME.border}`,
    borderRadius:'14px', boxShadow:THEME.shadow, ...style,
  });
  children.forEach(c => c && d.appendChild(c));
  return d;
}

// Pill badge
function pill(text, color, dk) {
  const s = document.createElement('span');
  s.textContent = text;
  Object.assign(s.style, {
    display:'inline-block', fontSize:'11px', background:color+'22',
    color:dk||color, border:`1px solid ${color}44`, padding:'2px 8px',
    borderRadius:'10px', fontWeight:'700',
  });
  return s;
}

function div(style={}, ...children) {
  const d = document.createElement('div');
  Object.assign(d.style, style);
  children.forEach(c => { if(c) d.appendChild(typeof c==='string' ? Object.assign(document.createElement('span'),{textContent:c}) : c); });
  return d;
}

function text(content, style={}) {
  const s = document.createElement('div');
  s.innerHTML = content;
  Object.assign(s.style, style);
  return s;
}

// Show toast
function showToast(msg, color=THEME.green) {
  STATE.toast = { msg, color };
  render();
  setTimeout(() => { STATE.toast=null; render(); }, 2500);
}

// ── HEADER ────────────────────────────────────────────────────────────────────
function buildHeader() {
  const stats = computeStats();
  const h = document.createElement('div');
  Object.assign(h.style, {
    background:THEME.navy, borderBottom:`3px solid ${THEME.green}`,
    height:'58px', padding:'0 20px', display:'flex', alignItems:'center',
    position:'sticky', top:'0', zIndex:'50',
  });
  h.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:22px">${CAMP_ICON}</span>
      <div>
        <div style="font-weight:800;font-size:15px;color:#fff;letter-spacing:0.02em">${CAMP_NAME}</div>
        <div style="font-size:10px;color:#9BA3C0;letter-spacing:0.05em;text-transform:uppercase">Camp Check-In</div>
      </div>
    </div>
    <div style="margin-left:auto;display:flex;gap:12px;font-size:12px;align-items:center">
      <span style="color:#74C94A;font-weight:700">● ${stats.inCamp}</span>
      <span style="color:${THEME.yellow};font-weight:700">🌙 ${stats.aftercare}</span>
    </div>
  `;
  return h;
}

// ── BOTTOM NAV ────────────────────────────────────────────────────────────────
function buildNav() {
  const nav = document.createElement('div');
  Object.assign(nav.style, {
    position:'fixed', bottom:'0', left:'0', right:'0',
    background:THEME.card, borderTop:`1px solid ${THEME.border}`,
    display:'flex', zIndex:'100', boxShadow:'0 -2px 12px rgba(27,29,44,0.08)',
    paddingBottom:'env(safe-area-inset-bottom)',
  });
  const tabs = [
    ['home','📊','Home'],
    ['scan','📷','Scan'],
    ['log','📝','Log'],
    ['admin','📋', STATE.adminUnlocked ? 'Admin' : 'Admin 🔒'],
    ['vol','🙋', STATE.volUnlocked ? (STATE.volUser?.name?.split(' ')[0] || 'Volunteer') : 'Vol'],
  ];
  tabs.forEach(([id, icon, label]) => {
    const active = STATE.view === id;
    const b = document.createElement('button');
    b.innerHTML = `<span style="font-size:22px;filter:${active?'none':'grayscale(0.4) opacity(0.6)'}">${icon}</span><span style="font-size:10px;font-weight:${active?700:500};color:${active?THEME.greenDk:THEME.muted}">${label}</span>`;
    Object.assign(b.style, {
      flex:'1', padding:'10px 4px 12px', background:'transparent', border:'none',
      cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:'3px',
    });
    b.onclick = () => handleNavClick(id);
    nav.appendChild(b);
  });
  return nav;
}

function handleNavClick(id) {
  stopCamera();
  if (id === 'admin') {
    if (STATE.adminUnlocked) { STATE.view='admin'; render(); return; }
    STATE.confirmPin='admin'; STATE.pinInput=''; STATE.pinError=''; STATE.pinStep='enter';
    render(); return;
  }
  if (id === 'vol') {
    if (STATE.volUnlocked) { STATE.view='vol'; render(); return; }
    // Show volunteer login
    STATE.modal = { type:'volLogin' }; render(); return;
  }
  STATE.view = id;
  render();
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function computeStats() {
  const statuses = {};
  STATE.campers.forEach(c => { statuses[c.id] = camperStatus(c.id, STATE.events); });
  return {
    inCamp:    Object.values(statuses).filter(s=>['arrived','restroom','medical','activity','lunch'].includes(s)).length,
    beforecare:Object.values(statuses).filter(s=>s==='beforecare').length,
    aftercare: Object.values(statuses).filter(s=>s==='aftercare').length,
    restroom:  Object.values(statuses).filter(s=>s==='restroom').length,
    out:       Object.values(statuses).filter(s=>s==='out').length,
    total:     STATE.campers.length,
    statuses,
  };
}

// ── HOME VIEW ─────────────────────────────────────────────────────────────────
function buildHome() {
  const stats = computeStats();
  const wrap = document.createElement('div');

  // Stat tiles
  const tiles = [
    ['● In Camp', stats.inCamp, THEME.greenDk],
    [`${CAMP_ICON} Total`, stats.total, THEME.greenDk],
    ['🚻 Break', stats.restroom, THEME.yellowDk],
    ['🌅 Before Care', stats.beforecare, THEME.purpleDk],
    ['🌙 After Care', stats.aftercare, THEME.purpleDk],
    ['🚗 Out', stats.out, THEME.muted],
  ];
  const grid = document.createElement('div');
  Object.assign(grid.style, {display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'10px', marginBottom:'16px'});
  tiles.forEach(([label, count, color]) => {
    const c = card([
      text(String(count), {fontSize:'26px',fontWeight:'800',color,lineHeight:'1',textAlign:'center'}),
      text(label, {fontSize:'11px',color:THEME.muted,marginTop:'4px',textAlign:'center'}),
    ], {padding:'14px 12px'});
    grid.appendChild(c);
  });
  wrap.appendChild(grid);

  // On restroom > 8 min alert
  const onBreak = STATE.campers.filter(c=>stats.statuses[c.id]==='restroom');
  if (onBreak.length) {
    const bc = card([
      text(`🚻 Potty Breaks <span style="font-size:11px;background:${THEME.yellow}44;color:${THEME.yellowDk};padding:1px 8px;border-radius:10px;font-weight:600;border:1px solid ${THEME.yellow}">${onBreak.length}</span>`,
        {fontWeight:'700',fontSize:'13px',color:THEME.yellowDk,marginBottom:'10px'}),
    ], {padding:'16px', marginBottom:'14px'});
    onBreak.forEach(c => {
      const sinceEv = STATE.events.find(e=>e.camperId===c.id&&e.action==='restroom');
      const mins = sinceEv ? minutesSince(sinceEv.ts) : null;
      const alert = mins !== null && mins >= 8;
      const row = div({display:'flex',justifyContent:'space-between',alignItems:'center',
        padding:'10px 12px',background:THEME.bg,borderRadius:'10px',
        border:`1px solid ${alert?THEME.red+'55':THEME.border}`,marginTop:'7px'});
      row.appendChild(div({flex:'1'},
        text(`<b>${c.name}</b>`,{fontSize:'14px',color:THEME.text}),
        c.allergies ? text(`⚠ ${c.allergies}`,{fontSize:'11px',color:THEME.alertTxt,fontWeight:'600'}) : null,
      ));
      if (mins!==null) row.appendChild(text(`${mins}m${alert?' ⚠':''}`,{fontSize:'16px',fontWeight:'800',color:alert?THEME.red:THEME.yellowDk}));
      bc.appendChild(row);
    });
    wrap.appendChild(bc);
  }

  // Before care
  const beforeCare = STATE.campers.filter(c=>stats.statuses[c.id]==='beforecare');
  if (beforeCare.length) {
    const bc = card([text(`🌅 Before Care (${beforeCare.length})`,{fontWeight:'700',fontSize:'13px',color:THEME.blueDk,marginBottom:'10px'})],{padding:'16px',marginBottom:'14px'});
    beforeCare.forEach(c => {
      const row = div({display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',background:THEME.bg,borderRadius:'10px',marginTop:'7px'});
      row.appendChild(text(`<b>${c.name}</b>`,{fontSize:'14px',color:THEME.text}));
      if(c.group) row.appendChild(text(c.group,{fontSize:'12px',color:THEME.muted}));
      bc.appendChild(row);
    });
    wrap.appendChild(bc);
  }

  // After care
  const afterCare = STATE.campers.filter(c=>stats.statuses[c.id]==='aftercare');
  if (afterCare.length) {

      ac.appendChild(row);
    });

  }

  // Medical
  const medicals = STATE.campers.filter(c=>stats.statuses[c.id]==='medical');
  if (medicals.length) {
    const mc = card([text(`🩺 Medical / Nurse (${medicals.length})`,{fontWeight:'700',fontSize:'13px',color:THEME.red,marginBottom:'10px'})],

      if(c.allergies) row.appendChild(text(`⚠ ${c.allergies}`,{fontSize:'11px',color:THEME.alertTxt,fontWeight:'600'}));
      mc.appendChild(row);
    });
    wrap.appendChild(mc);
  }

  // Today's checkouts
  const today = new Date().toDateString();
  const todayOut = STATE.events.filter(e=>['checkout','pickup'].includes(e.action)&&new Date(e.ts).toDateString()===today);
  if (todayOut.length) {
    const oc = card([text(`Today's Checkouts (${todayOut.length})`,{fontWeight:'700',fontSize:'13px',color:THEME.text,marginBottom:'10px'})],{padding:'16px',marginBottom:'14px'});

        text(fmtTime(ev.ts),{fontSize:'11px',color:THEME.muted}),
      ));
      oc.appendChild(row);
    });
    wrap.appendChild(oc);
  }

  return wrap;
}

  }
  wrap.appendChild(camBox);

  // Manual list

  const q = STATE.search.toLowerCase();
  const filteredCampers = STATE.campers.filter(c=>!q||c.name.toLowerCase().includes(q));
  const filteredStaff   = STATE.staff.filter(s=>!q||s.name.toLowerCase().includes(q));
  const filteredVols    = STATE.volunteers.filter(v=>!q||v.name.toLowerCase().includes(q));

      Object.assign(b.style,{padding:'12px 14px',background:THEME.bg,border:`1px solid ${THEME.border}`,

        </div>
        ${c.aftercare?`<span style="font-size:11px;color:${THEME.purpleDk}">🌙</span>`:''}
        ${c.group?`<span style="color:${THEME.muted};font-size:12px">${c.group}</span>`:''}
        <span style="font-size:12px;color:${sl.color};font-weight:600;flex-shrink:0">${sl.dot} ${sl.label}</span>
      `;
      Object.assign(b.style,{padding:'12px 14px',background:THEME.bg,
        border:`1px solid ${c.allergies?THEME.alertBdr:THEME.border}`,color:THEME.text,
        borderRadius:'10px',cursor:'pointer',display:'flex',alignItems:'center',gap:'10px',

      listDiv.appendChild(b);

  }

  wrap.appendChild(manual);
  return wrap;
}

    if(c.emergencyPhone) badges.appendChild(pill(`📱 ${c.emergencyPhone}`,THEME.grey,THEME.sub));
    info.appendChild(badges);

    if(c.allergies) {
      const aw = div({background:THEME.alertBg,border:`1.5px solid ${THEME.alertBdr}`,borderRadius:'8px',padding:'6px 10px',marginBottom:'6px'});

      Object.assign(shareBtn.style,{padding:'6px 10px',fontSize:'12px',fontWeight:'600',borderRadius:'8px',cursor:'pointer',fontFamily:'inherit',background:THEME.blue+'18',border:`1.5px solid ${THEME.blue}55`,color:THEME.blueDk,width:'100%',marginBottom:'2px'});
      shareBtn.onclick = () => { STATE.modal={type:'shareQR',camper:c}; render(); };

  wrap.appendChild(listDiv);
  return wrap;

function buildCamperActivityModal(m) {
  const camper = m.camper;
  const status = camperStatus(camper.id, STATE.events);
  const sl = STATUS_LABELS[status] || STATUS_LABELS.pending;
  const nextActions = NEXT_ACTIONS[status] || [];

  const backdrop = div({position:'fixed',inset:'0',background:'rgba(27,29,44,0.72)',display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:'300',padding:'0 14px 14px'});
  backdrop.onclick = ()=>{ STATE.modal=null; render(); };

    padding:'24px 22px',width:'100%',maxWidth:'440px',boxShadow:'0 -4px 30px rgba(27,29,44,0.18)'});
  box.onclick = e=>e.stopPropagation();

  // Header
  box.appendChild(text(`${CAMP_ICON} Camper Activity`,{fontSize:'10px',fontWeight:'700',color:THEME.greenDk,letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:'6px',textAlign:'center'}));
  box.appendChild(text(`<b>${camper.name}</b>`,{fontWeight:'800',fontSize:'22px',color:THEME.text,textAlign:'center',marginBottom:'2px'}));
  if(camper.group) box.appendChild(text(camper.group,{fontSize:'13px',color:THEME.muted,textAlign:'center',marginBottom:'4px'}));

  // Camper details
  const detailRows=[
    camper.age ? `🎂 Age ${camper.age}` : null,
    camper.parentName ? `👤 Parent: <b>${camper.parentName}</b>` : null,
    camper.parentPhone ? `📞 ${camper.parentPhone}` : null,
    camper.emergencyContact ? `🆘 Emergency: ${camper.emergencyContact}` : null,
    camper.medicalNotes ? `🩺 Medical: ${camper.medicalNotes}` : null,
  ].filter(Boolean);
  if(detailRows.length){
    const details=div({background:THEME.bg,borderRadius:'10px',padding:'10px 14px',marginBottom:'10px',marginTop:'8px'});
    detailRows.forEach(r=>details.appendChild(text(r,{fontSize:'13px',color:THEME.sub,marginBottom:'3px',lineHeight:'1.4'})));
    box.appendChild(details);
  }

  // Allergy alert
  if(camper.allergies){
    const aw=div({background:THEME.alertBg,border:`2px solid ${THEME.alertBdr}`,borderRadius:'12px',padding:'12px 14px',marginBottom:'10px'});
    aw.appendChild(div({display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px'},
      text('⚠️',{fontSize:'20px'}),
      text('ALLERGY ALERT',{fontWeight:'800',fontSize:'13px',color:THEME.alertTxt,letterSpacing:'0.08em'}),
    ));
    aw.appendChild(text(camper.allergies,{fontSize:'16px',fontWeight:'700',color:'#78350F',lineHeight:'1.4'}));
    box.appendChild(aw);
  }

  // Current status badge
  const statusBadge=div({textAlign:'center',marginBottom:'12px'});
  statusBadge.appendChild(div({display:'inline-block',padding:'4px 14px',borderRadius:'20px',fontSize:'12px',fontWeight:'600',
    background:sl.color+'22',color:sl.color,border:`1.5px solid ${sl.color}44`},
    text(`${sl.dot} ${sl.label}`,{color:sl.color})));
  box.appendChild(statusBadge);

  // Note field
  const noteWrap=div({marginBottom:'12px'});
  noteWrap.appendChild(text('Note (optional)',{fontSize:'11px',color:THEME.muted,fontWeight:'600',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:'6px'}));
  const noteI=inp('Add a note for this check-in…',m.note||'',v=>m.note=v,{area:true,style:{height:'60px',fontSize:'13px'}});
  noteWrap.appendChild(noteI);
  box.appendChild(noteWrap);

  // Action buttons
  const actWrap=div({display:'grid',gap:'10px',marginBottom:'10px'});
  nextActions.forEach(actionKey=>{
    const act=ACTIONS[actionKey];
    if(!act) return;
    const ab=document.createElement('button');
    ab.innerHTML=`${act.icon}&nbsp;&nbsp;${act.label}`;
    Object.assign(ab.style,{padding:'15px',borderRadius:'14px',fontFamily:'inherit',
      border:`1.5px solid ${act.color}55`,background:act.color+'18',
      color:act.color===THEME.yellow?THEME.yellowDk:act.dk,
      cursor:'pointer',fontWeight:'700',fontSize:'16px',width:'100%'});
    ab.onclick=async()=>{
      const ev=await logEvent(camper.id,actionKey,noteI.value.trim());
      STATE.lastScanResult={name:camper.name,action:actionKey,ts:ev.ts};
      STATE.modal=null; scanLocked=false;
      showToast(`${act.icon} ${act.label} — ${camper.name}`);
    };
    actWrap.appendChild(ab);
  });
  box.appendChild(actWrap);
  box.appendChild(btn('Cancel',()=>{ STATE.modal=null; scanLocked=false; render(); },{full:true,ghost:true,textColor:THEME.muted}));

  backdrop.appendChild(box);
  return backdrop;
}

  const grid=div({display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'12px',marginBottom:'16px'});
  [1,2,3,4,5,6,7,8,9,'',0,'⌫'].forEach((k,i)=>{

    const b=document.createElement('button');

    Object.assign(b.style,{padding:'18px 0',borderRadius:'12px',border:`1.5px solid ${THEME.border}`,
      background:k==='⌫'?THEME.surface:THEME.card,color:THEME.text,fontSize:k==='⌫'?'20px':'22px',
      fontWeight:'600',cursor:'pointer',fontFamily:'inherit'});
    b.onclick=()=>{
      if(k==='⌫'){ STATE.pinInput=STATE.pinInput.slice(0,-1); STATE.pinError=''; render(); return; }
      const next=STATE.pinInput+String(k);
      STATE.pinInput=next;
      if(next.length===4) handlePin(next);
      else render();
    };

function handlePin(entered) {
  const stored=STATE.adminPin;
  if(STATE.confirmPin==='admin'){
    if(entered===stored){
      STATE.adminUnlocked=true; STATE.confirmPin=null; STATE.pinInput=''; STATE.view='admin'; render();
    } else {
      STATE.pinError='Incorrect PIN'; STATE.pinInput='';
      setTimeout(()=>{ STATE.pinError=''; render(); },700);
      render();
    }
    return;
  }
  if(STATE.confirmPin==='changePin'){
    if(STATE.pinStep==='enter'){
      if(entered===stored){ STATE.pinStep='new'; STATE.pinInput=''; render(); }
      else { STATE.pinError='Incorrect PIN'; STATE.pinInput=''; setTimeout(()=>{ STATE.pinError=''; render(); },700); render(); }
    } else if(STATE.pinStep==='new'){
      STATE.pinNewTemp=entered; STATE.pinStep='confirm'; STATE.pinInput=''; render();
    } else {
      if(entered===STATE.pinNewTemp){
        kvPut(KEYS.adminPin,entered); STATE.adminPin=entered;
        STATE.confirmPin=null; STATE.pinInput=''; STATE.pinStep='enter'; STATE.pinNewTemp='';
        showToast('✅ PIN updated');
      } else {
        STATE.pinError="PINs don't match"; STATE.pinInput=''; STATE.pinStep='new'; STATE.pinNewTemp='';
        setTimeout(()=>{ STATE.pinError=''; render(); },700); render();
      }
    }
    return;
  }
}

// ── CAMERA ────────────────────────────────────────────────────────────────────
function startCameraUI() {
  STATE.scanActive=true; STATE.scanError=null; STATE.lastScanResult=null; render();
}

async function startCamera() {
  if(scanStream) return; // already running
  try {
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}});
    scanStream=stream;
    if(videoEl){
      videoEl.srcObject=stream;
      videoEl.onloadedmetadata=()=>{ videoEl.play().catch(()=>{}); };
      videoEl.onplaying=()=>{ if(!scanRAF) scanFrame(); };
      // Belt-and-suspenders: also start after 1.5s in case onplaying doesn't fire (some iOS)
      setTimeout(()=>{ if(scanStream&&videoEl&&!scanRAF) scanFrame(); },1500);
    }
  } catch(e) { STATE.scanError='Camera access denied — '+e.message; render(); }
}

function stopCamera() {
  if(scanStream){ scanStream.getTracks().forEach(t=>t.stop()); scanStream=null; }
  if(scanRAF){ cancelAnimationFrame(scanRAF); scanRAF=null; }
  videoEl=null; canvasEl=null;
  STATE.scanActive=false; scanLocked=false;
}

// Use native BarcodeDetector (faster, better on iPhone/Android) with jsQR fallback
let barcodeDetector = null;
try {
  if('BarcodeDetector' in window) {
    barcodeDetector = new BarcodeDetector({formats:['qr_code']});
  }
} catch(e){}

let _frameTick=0;
async function scanFrame() {
  if(!videoEl||!scanStream) return;
  // Pulse status every 30 frames so user knows scanner is alive
  _frameTick++;
  if(_frameTick%30===0){
    const el=document.getElementById('scan-status');
    if(el) el.textContent=(_frameTick%60===0?'🔍':'👁')+' Scanning...';
  }
  if(videoEl.videoWidth>0 && videoEl.videoHeight>0 && !scanLocked){
    if(barcodeDetector){
      try{
        const codes = await barcodeDetector.detect(videoEl);
        if(!scanLocked && codes.length>0 && codes[0].rawValue){
          handleQRScan(codes[0].rawValue); return;
        }
      }catch(e){}
    } else if(canvasEl && typeof jsQR!=='undefined'){
      canvasEl.width=videoEl.videoWidth; canvasEl.height=videoEl.videoHeight;
      const ctx=canvasEl.getContext('2d',{willReadFrequently:true});
      ctx.drawImage(videoEl,0,0);
      const img=ctx.getImageData(0,0,canvasEl.width,canvasEl.height);
      const code=jsQR(img.data,img.width,img.height,{inversionAttempts:'attemptBoth'});
      if(!scanLocked && code?.data){ handleQRScan(code.data); return; }
    }
  }
  scanRAF=requestAnimationFrame(scanFrame);
}

function handleQRScan(data) {
  if(scanLocked) return;
  scanLocked=true;
  stopCamera(); // stop cleanly before modal re-render
  if(data.startsWith('CAMP:')){
    const id=data.slice(5);
    const camper=STATE.campers.find(c=>c.id===id);
    if(camper){ STATE.modal={type:'camperActivity',camper,note:''}; render(); return; }
  }
  if(data.startsWith('PARENT:')){
    const id=data.slice(7);
    const camper=STATE.campers.find(c=>c.id===id);
    if(camper){ STATE.modal={type:'parentPickup',camper,note:''}; render(); return; }
  }
  if(data.startsWith('STAFF:')){
    const id=data.slice(6);
    const staff=STATE.staff.find(s=>s.id===id)||STATE.volunteers.find(v=>v.id===id);
    if(staff){ STATE.modal={type:'staffClock',staff}; render(); return; }
  }
  STATE.scanError=`QR scanned but not recognized (${data.slice(0,20)}). Make sure campers are added and synced.`;
  setTimeout(()=>{ STATE.scanError=null; scanLocked=false; render(); },2500);
  render();
}

  // Other modals
  if(STATE.modal){
    const m=STATE.modal;
    if(m.type==='camperActivity')  app.appendChild(buildCamperActivityModal(m));
    if(m.type==='parentPickup')    app.appendChild(buildParentPickupModal(m));
    if(m.type==='camperQR')        app.appendChild(buildCamperQRModal(m));
    if(m.type==='staffQR')         app.appendChild(buildStaffQRModal(m));
    if(m.type==='staffClock')      app.appendChild(buildStaffClockModal(m));
    if(m.type==='volLogin')        app.appendChild(buildVolLoginModal());
    if(m.type==='editCamper')      app.appendChild(buildEditCamperModal(m));
    if(m.type==='shareQR')         app.appendChild(buildShareQRModal(m));
  }

  app.appendChild(document.createElement('style')).textContent=
    '*{box-sizing:border-box;}input::placeholder,textarea::placeholder{color:#8EA893;}::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:#B4D8BA;border-radius:2px;}button:hover:not(:disabled){opacity:0.88;}button:active:not(:disabled){transform:scale(0.97);}';

  return app;
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
loadData();
</script>

  <!-- Sync status dot - shows in header -->
  <style>
    #sync-badge {
      position: fixed; top: 8px; right: 12px; z-index: 9999;
      font-size: 11px; font-weight: 700; padding: 3px 10px;
      border-radius: 12px; letter-spacing: 0.04em;
      background: #1a1a1a; color: #aaa; border: 1px solid #333;
    }
    #sync-badge.ok  { background:#0f3320; color:#4ade80; border-color:#4ade80; }
    #sync-badge.err { background:#3b0a0a; color:#f87171; border-color:#f87171; }
  </style>
  <div id="sync-badge">● SYNC</div>
  <script>
    setInterval(() => {
      const el = document.getElementById('sync-badge');
      if (!el) return;
      if (window.SYNC_OK === true)  { el.className='ok';  el.textContent='● SYNCED'; }
      if (window.SYNC_OK === false) { el.className='err'; el.textContent='✕ SYNC ERROR'; }
    }, 2000);
  </script>
